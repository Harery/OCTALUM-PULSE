version: "2"

run:
  timeout: 5m

linters:
  default: fast
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gofmt
    - goimports

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Sprintf
        - fmt.Fprintf
        - fmt.Print
        - fmt.Fprint

    govet:
      disable:
        - shadow

    misspell:
      locale: US

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: test/mocks/
        linters:
          - unused
          - errcheck
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
