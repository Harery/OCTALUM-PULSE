version: "2"

run:
  timeout: 5m

linters:
  default: fast
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocyclo
    - dupl
    - goconst
    - gocritic
    - prealloc
    - bodyclose
    - noctx
    - sqlclosecheck
    - tparallel

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      disable:
        - shadow

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: test/mocks/
        linters:
          - unused
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
