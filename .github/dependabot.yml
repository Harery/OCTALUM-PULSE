# Dependabot Configuration
# Automated dependency updates and security monitoring

version: 2
updates:

  # GitHub Actions workflow dependencies
  - directory: /
    package-ecosystem: "github-actions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # Dockerfile dependencies (container builds)
  - directory: "/"
    package-ecosystem: "docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
      include: "scope"

  # Go modules
  - directory: "/"
    package-ecosystem: "gomod"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      go-deps:
        patterns:
          - "*"
